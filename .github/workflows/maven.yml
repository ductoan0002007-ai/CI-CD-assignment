name: Maven CI/CD Build

# 1. Kích hoạt (Trigger) khi có sự kiện push hoặc tạo pull_request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux của GitHub

    steps:
    - name: Tải mã nguồn về máy ảo
      uses: actions/checkout@v4

    - name: Cài đặt môi trường Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # Caching giúp các lần build sau nhanh hơn

    # 2. Thực thi vòng đời Maven (chạy cả phase 'test' và 'package')
    - name: Chạy Build, Test và Đóng gói
      run: mvn -B clean package

    # 3. Lưu trữ tệp .jar sinh ra (Upload Artifact)
    - name: Lưu trữ sản phẩm (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: mathutils-app-jar
        path: target/*.jar